<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" width="1100" height="660" font-family="Arial, sans-serif">

  <rect width="1100" height="660" fill="#f8f9fa" rx="12"/>
  <text x="550" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Conexión de intercambiadores HX al circuito de depuración — primarios y secundarios</text>
  <line x1="40" y1="40" x2="1060" y2="40" stroke="#cccccc" stroke-width="1"/>

  <!-- LEYENDA -->
  <rect x="760" y="48" width="326" height="166" rx="8" fill="white" stroke="#dddddd" stroke-width="1"/>
  <text x="923" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Leyenda</text>
  <line x1="770" y1="70" x2="1076" y2="70" stroke="#dddddd" stroke-width="0.8"/>
  <rect x="774" y="78" width="22" height="10" rx="2" fill="#1565C0" opacity="0.8"/>
  <text x="804" y="88" font-size="10" fill="#333">Agua piscina — circuito secundario</text>
  <rect x="774" y="96" width="22" height="10" rx="2" fill="#E53935"/>
  <text x="804" y="106" font-size="10" fill="#333">VP — Válvula motorizada 2 vías</text>
  <rect x="774" y="114" width="22" height="10" rx="2" fill="#E65100"/>
  <text x="804" y="124" font-size="10" fill="#333">Primario caliente → entrada al HX</text>
  <rect x="774" y="132" width="22" height="10" rx="2" fill="#FF8F00"/>
  <text x="804" y="142" font-size="10" fill="#333">Primario enfriado → salida del HX</text>
  <rect x="774" y="150" width="22" height="10" rx="2" fill="#2E7D32"/>
  <text x="804" y="160" font-size="10" fill="#333">EV_BYPASS NC — bypass filtración</text>
  <rect x="774" y="168" width="22" height="10" rx="2" fill="#4A148C"/>
  <text x="804" y="178" font-size="10" fill="#333">IF_PISC — interruptor flujo (cadena HW)</text>
  <text x="774" y="196" font-size="9" fill="#888" font-style="italic">Los primarios nunca contactan</text>
  <text x="774" y="208" font-size="9" fill="#888" font-style="italic">con el agua de piscina.</text>

  <!-- PISCINA -->
  <rect x="22" y="195" width="82" height="160" rx="10" fill="#B3E5FC" stroke="#0288D1" stroke-width="2"/>
  <text x="63" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#01579B">PISCINA</text>
  <text x="63" y="283" text-anchor="middle" font-size="10" fill="#01579B">36 m³</text>
  <path d="M30 338 Q44 328 58 338 Q72 348 86 338 Q100 328 104 338" stroke="#0288D1" stroke-width="1.5" fill="none"/>
  <line x1="104" y1="255" x2="140" y2="255" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="138,250 150,255 138,260" fill="#1565C0"/>
  <text x="122" y="248" text-anchor="middle" font-size="9" fill="#1565C0">Aspiración</text>

  <!-- BOMBA -->
  <circle cx="178" cy="255" r="26" fill="white" stroke="#1565C0" stroke-width="2"/>
  <text x="178" y="251" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565C0">BOMBA</text>
  <text x="178" y="263" text-anchor="middle" font-size="9" fill="#1565C0">FILTR.</text>
  <line x1="204" y1="255" x2="240" y2="255" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="238,250 250,255 238,260" fill="#1565C0"/>

  <!-- FILTRO -->
  <rect x="250" y="232" width="54" height="46" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
  <text x="277" y="252" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565C0">FILTRO</text>
  <text x="277" y="265" text-anchor="middle" font-size="8" fill="#1565C0">Arena</text>
  <line x1="304" y1="255" x2="318" y2="255" stroke="#1565C0" stroke-width="2.5"/>

  <!-- IF_PISC — interruptor de flujo -->
  <rect x="318" y="243" width="36" height="24" rx="4" fill="#4A148C"/>
  <text x="336" y="254" text-anchor="middle" font-size="8" font-weight="bold" fill="white">IF_PISC</text>
  <text x="336" y="264" text-anchor="middle" font-size="7" fill="#CE93D8">NA·DN25</text>
  <!-- flecha de conexión IF hacia colector -->
  <line x1="354" y1="255" x2="342" y2="255" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="340,250 352,255 340,260" fill="#1565C0"/>
  <!-- línea de cadena seguridad (punteada morada) bajando del IF hacia las VP -->
  <line x1="336" y1="267" x2="336" y2="430" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="331,426 336,438 341,426" fill="#7B1FA2"/>
  <text x="340" y="360" font-size="8" fill="#7B1FA2" transform="rotate(90,340,360)">cadena seguridad → VP_HX (serie)</text>

  <!-- COLECTOR DISTRIBUCIÓN -->
  <rect x="352" y="212" width="20" height="214" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="2"/>
  <text x="362" y="207" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="bold">COL.</text>

  <!-- ===== RAMA 1: HX1 (Solar) ===== -->
  <line x1="372" y1="233" x2="406" y2="233" stroke="#1565C0" stroke-width="2.5"/>
  <rect x="406" y="222" width="28" height="22" rx="3" fill="#E53935"/>
  <text x="420" y="233" text-anchor="middle" font-size="8" font-weight="bold" fill="white">VP</text>
  <text x="420" y="243" text-anchor="middle" font-size="7" fill="white">HX1</text>
  <line x1="434" y1="233" x2="468" y2="233" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="466,228 478,233 466,238" fill="#1565C0"/>
  <!-- HX1 -->
  <rect x="478" y="200" width="110" height="66" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="533" y="221" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565C0">HX1</text>
  <text x="533" y="235" text-anchor="middle" font-size="9" fill="#1565C0">Solar · 5 kW · DN20</text>
  <line x1="533" y1="208" x2="533" y2="260" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="505" y="258" font-size="7" fill="#1565C0">SEC →</text>
  <text x="544" y="258" font-size="7" fill="#E65100">← PRIM</text>
  <line x1="588" y1="233" x2="628" y2="233" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="626,228 638,233 626,238" fill="#1565C0"/>

  <!-- Primario HX1: fuente arriba-derecha -->
  <rect x="640" y="140" width="150" height="38" rx="5" fill="#FBE9E7" stroke="#E65100" stroke-width="1.5"/>
  <text x="715" y="156" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">Mini bucle intermedio</text>
  <text x="715" y="170" text-anchor="middle" font-size="9" fill="#BF360C">(primario solar)</text>
  <!-- flecha IN primario → HX1 (entra por arriba derecha del HX) -->
  <line x1="640" y1="159" x2="588" y2="207" stroke="#E65100" stroke-width="2.5"/>
  <polygon points="583,205 591,194 595,206" fill="#E65100"/>
  <text x="626" y="178" font-size="9" font-weight="bold" fill="#E65100">42°C IN</text>
  <!-- flecha OUT primario ← HX1 (sale por abajo derecha del HX) -->
  <line x1="588" y1="259" x2="643" y2="296" stroke="#FF8F00" stroke-width="2"/>
  <polygon points="639,292 647,304 651,292" fill="#FF8F00"/>
  <rect x="643" y="302" width="148" height="24" rx="4" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.2"/>
  <text x="717" y="318" text-anchor="middle" font-size="9" fill="#E65100">OUT 35°C → retorno bucle</text>

  <!-- ===== RAMA 2: HX_BDC ===== -->
  <line x1="372" y1="313" x2="406" y2="313" stroke="#1565C0" stroke-width="2.5"/>
  <rect x="406" y="302" width="28" height="22" rx="3" fill="#E53935"/>
  <text x="420" y="313" text-anchor="middle" font-size="8" font-weight="bold" fill="white">VP</text>
  <text x="420" y="323" text-anchor="middle" font-size="7" fill="white">BDC</text>
  <line x1="434" y1="313" x2="468" y2="313" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="466,308 478,313 466,318" fill="#1565C0"/>
  <!-- HX_BDC -->
  <rect x="478" y="280" width="110" height="66" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="533" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">HX_BDC</text>
  <text x="533" y="314" text-anchor="middle" font-size="9" fill="#1565C0">BDC · 12 kW · DN25</text>
  <line x1="533" y1="288" x2="533" y2="340" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="505" y="338" font-size="7" fill="#1565C0">SEC →</text>
  <text x="544" y="338" font-size="7" fill="#E65100">← PRIM</text>
  <line x1="588" y1="313" x2="628" y2="313" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="626,308 638,313 626,318" fill="#1565C0"/>

  <!-- Primario HX_BDC: fuente a la derecha -->
  <rect x="700" y="285" width="148" height="38" rx="5" fill="#FBE9E7" stroke="#E65100" stroke-width="1.5"/>
  <text x="774" y="300" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">Primario BDC</text>
  <text x="774" y="315" text-anchor="middle" font-size="9" fill="#BF360C">(bomba de calor)</text>
  <!-- flecha IN primario → HX_BDC -->
  <line x1="700" y1="300" x2="590" y2="291" stroke="#E65100" stroke-width="2.5"/>
  <polygon points="585,288 596,282 594,294" fill="#E65100"/>
  <text x="648" y="290" font-size="9" font-weight="bold" fill="#E65100">42°C IN</text>
  <!-- flecha OUT primario ← HX_BDC -->
  <line x1="590" y1="340" x2="700" y2="348" stroke="#FF8F00" stroke-width="2"/>
  <polygon points="696,344 708,352 697,357" fill="#FF8F00"/>
  <rect x="700" y="353" width="148" height="24" rx="4" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.2"/>
  <text x="774" y="369" text-anchor="middle" font-size="9" fill="#E65100">OUT 35°C → retorno BDC</text>

  <!-- ===== RAMA 3: HX_HTR ===== -->
  <line x1="372" y1="393" x2="406" y2="393" stroke="#1565C0" stroke-width="2.5"/>
  <rect x="406" y="382" width="28" height="22" rx="3" fill="#E53935"/>
  <text x="420" y="393" text-anchor="middle" font-size="8" font-weight="bold" fill="white">VP</text>
  <text x="420" y="403" text-anchor="middle" font-size="7" fill="white">HTR</text>
  <line x1="434" y1="393" x2="468" y2="393" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="466,388 478,393 466,398" fill="#1565C0"/>
  <!-- HX_HTR -->
  <rect x="478" y="360" width="110" height="66" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="533" y="380" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">HX_HTR</text>
  <text x="533" y="394" text-anchor="middle" font-size="9" fill="#1565C0">HTR · 3 kW · DN20</text>
  <line x1="533" y1="368" x2="533" y2="420" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="505" y="418" font-size="7" fill="#1565C0">SEC →</text>
  <text x="544" y="418" font-size="7" fill="#E65100">← PRIM</text>
  <line x1="588" y1="393" x2="628" y2="393" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="626,388 638,393 626,398" fill="#1565C0"/>

  <!-- Primario HX_HTR: fuente a la derecha -->
  <rect x="700" y="360" width="148" height="38" rx="5" fill="#FBE9E7" stroke="#E65100" stroke-width="1.5"/>
  <text x="774" y="375" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">HTR (recuperación)</text>
  <text x="774" y="390" text-anchor="middle" font-size="9" fill="#BF360C">(bomba de calor)</text>
  <!-- flecha IN primario → HX_HTR -->
  <line x1="700" y1="372" x2="590" y2="373" stroke="#E65100" stroke-width="2.5"/>
  <polygon points="585,369 596,364 594,376" fill="#E65100"/>
  <text x="645" y="365" font-size="9" font-weight="bold" fill="#E65100">75°C IN</text>
  <!-- flecha OUT primario ← HX_HTR -->
  <line x1="590" y1="420" x2="700" y2="428" stroke="#FF8F00" stroke-width="2"/>
  <polygon points="696,424 708,432 697,437" fill="#FF8F00"/>
  <rect x="700" y="433" width="148" height="24" rx="4" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.2"/>
  <text x="774" y="449" text-anchor="middle" font-size="9" fill="#E65100">OUT 65°C → retorno HTR</text>

  <!-- ===== RAMA 4: EV_BYPASS ===== -->
  <line x1="372" y1="448" x2="408" y2="448" stroke="#2E7D32" stroke-width="2.5"/>
  <rect x="408" y="436" width="44" height="24" rx="3" fill="#1B5E20"/>
  <text x="430" y="447" text-anchor="middle" font-size="8" font-weight="bold" fill="white">EV_BYPASS</text>
  <text x="430" y="458" text-anchor="middle" font-size="7" fill="#A5D6A7">NC · DN25</text>
  <line x1="452" y1="448" x2="628" y2="448" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="540" y="440" text-anchor="middle" font-size="8" fill="#2E7D32" font-style="italic">paralelo eléctrico con VP_HX · sin salida Eliwell</text>

  <!-- COLECTOR RETORNO -->
  <rect x="628" y="212" width="20" height="254" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="2"/>
  <text x="638" y="207" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="bold">COL.</text>

  <!-- Retorno a piscina -->
  <line x1="648" y1="340" x2="740" y2="340" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="740" y1="340" x2="740" y2="530" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="740" y1="530" x2="63" y2="530" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="63" y1="530" x2="63" y2="356" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="58,360 63,348 68,360" fill="#1565C0"/>
  <text x="400" y="546" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">Retorno a piscina — agua calentada</text>

  <!-- NOTA -->
  <rect x="22" y="566" width="726" height="74" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="34" y="583" font-size="10" font-weight="bold" fill="#E65100">Principio de funcionamiento de los primarios:</text>
  <text x="34" y="598" font-size="9" fill="#333">Cada HX tiene dos circuitos hidráulicos separados por placas de titanio. El fluido primario caliente entra (rojo), cede calor al agua de</text>
  <text x="34" y="612" font-size="9" fill="#333">piscina que fluye por el otro lado (azul), y sale más frío (naranja) de regreso a su fuente. Nunca hay contacto entre ambos fluidos.</text>
  <text x="34" y="626" font-size="9" fill="#333">HTR: 75→65°C (ΔT=10K, LMTD 43K) · BDC primario: 42→35°C (LMTD 10.4K) · Solar (bucle): 42→35°C (LMTD 10.4K)</text>

</svg>
